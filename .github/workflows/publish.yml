# Publish to npm when a tag is pushed
name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set."
            echo "::error::Go to GitHub repo → Settings → Secrets and variables → Actions"
            echo "::error::Add a repository secret named NPM_TOKEN with your npm automation token."
            exit 1
          fi
          echo "NPM_TOKEN is set (length: ${#NODE_AUTH_TOKEN})"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
